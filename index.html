<title>Declaração de Amor</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

/* FUNDO ANIMADO */
body{
  min-height:100vh;
  overflow-x:hidden;
  color:white;

  background: linear-gradient(-45deg, #2b0000, #8b0000, #4b001a, #1a0000);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite, fadeIn 2s ease-in;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,0.04), transparent 45%);
  animation: floatGlow 10s infinite alternate;
  pointer-events:none;
}

@keyframes floatGlow{
  from{transform:translateY(0px);}
  to{transform:translateY(20px);}
}
